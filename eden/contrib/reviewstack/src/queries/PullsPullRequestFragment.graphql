fragment PullsPullRequestFragment on PullRequest {
  number
  title
  updatedAt
  author {
    ...ActorFragment
  }
  comments {
    totalCount
  }
  isReadByViewer
  reviewDecision
  labels(first: 20, orderBy: {field: NAME, direction: ASC}) {
    nodes {
      ...LabelFragment
    }
  }
  latestReviews(first: 20) {
    nodes {
      author {
        login
      }
    }
  }
}
