smallvec = { version = "1.15.2", features = ["const_generics", "impl_bincode", "serde", "specialization", "union", "write"] }
tokio = { version = "1.52.3", features = ["full", "test-util", "tracing"] }

[dev-dependencies]
flume = "0.11.1"
sapling-minibench = { version = "0.1.0", path = "../minibench" }
