# @generated by autocargo from //eden/scm/lib/slex:[executor-benches,slex]

[package]
name = "slex"
version = "0.1.0"
authors = ["Meta Source Control Team <sourcecontrol-dev@meta.com>"]
edition = "2024"
homepage = "https://sapling-scm.com/"
repository = "https://github.com/facebook/sapling"
license = "MIT"

[[bench]]
name = "executor"
harness = false

[[bench]]
name = "executor_benches"
