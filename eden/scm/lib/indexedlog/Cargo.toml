# @generated by autocargo from //eden/scm/lib/indexedlog:[indexedlog,low_fileno_limit_test,sigbus_truncate_rlock_noop_sync_test]

[package]
name = "sapling-indexedlog"
version = "0.1.0"
authors = ["Meta Source Control Team <sourcecontrol-dev@meta.com>"]
edition = "2024"
description = "Append-only on-disk storage with integrity checks and radix tree indexing."
homepage = "https://sapling-scm.com/"
repository = "https://github.com/facebook/sapling"
license = "MIT"

[lib]
name = "indexedlog"

[[test]]
name = "low_fileno_limit_test"
path = "tests/low_fileno_limit.rs"

[[test]]
name = "sigbus_truncate_rlock_noop_sync_test"
path = "tests/sigbus_truncate_rlock_noop_sync.rs"

[[bench]]
name = "index"
harness = false

[[bench]]
name = "log"
harness = false

[[bench]]
name = "misc"
harness = false

[dependencies]
byteorder = "1.5"
memmap2 = "0.9.10"
rand = "0.10.1"
sapling-atomicfile = { version = "0.1.0", path = "../atomicfile" }
sapling-configmodel = { version = "0.1.0", path = "../config/model", optional = true }
sapling-metrics = { version = "0.1.0", path = "../metrics", optional = true }
sapling-minibytes = { version = "0.1.0", path = "../minibytes" }
sapling-vlqencoding = { version = "0.1.0", path = "../vlqencoding" }
tempfile = "3.27.0"
tracing = { version = "0.1.41", features = ["attributes", "valuable"] }
twox-hash = "1.6.1"

[dev-dependencies]
ctor = "1.0.7"
quickcheck = "1.1"
rand_chacha = "0.10"
sapling-dev-logger = { version = "0.1.0", path = "../dev-logger" }
sapling-minibench = { version = "0.1.0", path = "../minibench" }

[target.'cfg(target_os = "linux")'.dependencies]
hex = { version = "0.4.3", features = ["alloc"] }
libc = "0.2.186"
sapling-btrfs = { version = "0.1.0", path = "../util/btrfs", optional = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
sapling-fsinfo = { version = "0.1.0", path = "../fsinfo" }
tempfile = "3.27.0"

[target.'cfg(target_os = "macos")'.dependencies]
hex = { version = "0.4.3", features = ["alloc"] }
libc = "0.2.186"

[target.'cfg(target_os = "macos")'.dev-dependencies]
tempfile = "3.27.0"

[target.'cfg(target_os = "windows")'.dependencies]
winapi = { version = "0.3", features = ["everything", "std"] }

[features]
btrfs = ["sapling-btrfs"]
configurable = ["sapling-configmodel"]
metrics = ["sapling-metrics"]
sigbus-handler = []
